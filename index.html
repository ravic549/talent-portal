<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ensetu · Talent Intelligence</title>
<style>
  :root {
    --navy: #1a3a6b;
    --navy-dark: #122952;
    --navy-light: #e6f1fb;
    --bg: #f7f8fa;
    --surface: #ffffff;
    --border: #e2e6ea;
    --border-hover: #b0bec5;
    --text: #1a1a2e;
    --text-sec: #6b7280;
    --text-hint: #9ca3af;
    --green-bg: #eaf3de; --green-text: #27500a;
    --amber-bg: #faeeda; --amber-text: #633806;
    --red-bg: #fcebeb; --red-text: #791f1f;
    --radius: 10px; --radius-sm: 7px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
  
  /* LAYOUT */
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 10; }
  .brand { font-size: 16px; font-weight: 600; color: var(--navy); letter-spacing: -0.3px; }
  .brand span { color: var(--text-sec); font-weight: 400; font-size: 14px; margin-left: 6px; }
  .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem; }
  
  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-val { font-size: 26px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
  
  /* TOOLBAR */
  .toolbar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; gap: 10px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 220px; position: relative; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; transition: border-color 0.15s; }
  .search-wrap input:focus { outline: none; border-color: var(--navy); background: #fff; }
  .s-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-hint); font-size: 15px; pointer-events: none; }
  select { padding: 9px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; background: var(--bg); color: var(--text); font-family: inherit; cursor: pointer; }
  select:focus { outline: none; border-color: var(--navy); }
  .view-toggle { display: flex; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .vbtn { padding: 8px 13px; background: transparent; border: none; cursor: pointer; font-size: 13px; color: var(--text-sec); font-family: inherit; transition: background 0.1s; }
  .vbtn.active { background: var(--navy); color: #fff; font-weight: 500; }
  .add-btn { padding: 9px 16px; background: var(--navy); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 500; white-space: nowrap; transition: background 0.15s; }
  .add-btn:hover { background: var(--navy-dark); }
  
  /* META */
  .meta-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .meta-txt { font-size: 12px; color: var(--text-sec); }
  .meta-txt strong { color: var(--text); }
  
  /* TAGS / BADGES */
  .tag { font-size: 11px; padding: 3px 9px; border-radius: 20px; background: var(--navy-light); color: var(--navy); font-weight: 500; display: inline-block; }
  .tag.hi { background: var(--navy); color: #fff; }
  .np { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: 500; display: inline-block; white-space: nowrap; }
  .np-i { background: var(--green-bg); color: var(--green-text); }
  .np-30 { background: var(--amber-bg); color: var(--amber-text); }
  .np-60 { background: var(--red-bg); color: var(--red-text); }
  
  /* CARD VIEW */
  .card-grid { display: flex; flex-direction: column; gap: 8px; }
  .ccard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .ccard:hover { border-color: var(--navy); box-shadow: 0 2px 8px rgba(26,58,107,0.08); }
  .ccard.sel { border-color: var(--navy); border-width: 1.5px; }
  .cc-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 9px; }
  .ava { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .cname { font-size: 14px; font-weight: 600; color: var(--text); }
  .crole { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
  .cc-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
  .cc-foot { display: flex; gap: 18px; border-top: 1px solid var(--border); padding-top: 9px; }
  .fi { font-size: 12px; color: var(--text-sec); }
  .fi strong { color: var(--text); font-weight: 500; }
  .score-pill { font-size: 12px; font-weight: 600; color: var(--navy); }
  
  /* TABLE VIEW */
  .tbl-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); background: var(--bg); white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f0f4ff; cursor: pointer; }
  tr.sel-row td { background: #e8eef8; }
  .score-bar-sm { height: 5px; background: #e2e6ea; border-radius: 10px; width: 60px; overflow: hidden; }
  .score-bar-fill { height: 100%; background: var(--navy); border-radius: 10px; }
  
  /* DETAIL PANEL */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; display: flex; align-items: flex-end; justify-content: center; }
  .detail { background: var(--surface); border-radius: var(--radius) var(--radius) 0 0; width: 100%; max-width: 580px; max-height: 85vh; overflow-y: auto; padding: 1.5rem; }
  .dp-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.25rem; }
  .dp-ava { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; flex-shrink: 0; }
  .dp-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-sec); padding: 4px; line-height: 1; }
  .dp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 1rem 0; }
  .dp-field { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; }
  .dp-lbl { font-size: 11px; color: var(--text-sec); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .dp-val { font-size: 14px; font-weight: 500; color: var(--text); }
  .score-section { margin: 1rem 0; }
  .score-row { margin-bottom: 10px; }
  .score-row-head { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-sec); margin-bottom: 4px; }
  .score-bar-full { height: 6px; background: #e2e6ea; border-radius: 10px; overflow: hidden; }
  .score-bar-full-fill { height: 100%; background: var(--navy); border-radius: 10px; }
  .dp-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
  .dp-btn { flex: 1; padding: 10px; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; font-weight: 500; cursor: pointer; border: none; transition: background 0.15s; }
  .dp-btn-primary { background: var(--navy); color: #fff; }
  .dp-btn-primary:hover { background: var(--navy-dark); }
  .dp-btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .dp-btn-secondary:hover { background: #e8eef8; }
  .dp-btn-danger { background: #fcebeb; color: #791f1f; }
  .dp-btn-danger:hover { background: #f7c1c1; }
  
  /* ADD FORM MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--surface); border-radius: var(--radius); width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; padding: 1.5rem; }
  .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-field { display: flex; flex-direction: column; gap: 5px; }
  .form-field.full { grid-column: 1 / -1; }
  .form-field label { font-size: 12px; font-weight: 500; color: var(--text-sec); }
  .form-field input, .form-field select, .form-field textarea { padding: 9px 11px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; color: var(--text); background: var(--bg); transition: border-color 0.15s; }
  .form-field input:focus, .form-field select:focus, .form-field textarea:focus { outline: none; border-color: var(--navy); background: #fff; }
  .form-field textarea { resize: vertical; min-height: 60px; }
  .form-hint { font-size: 11px; color: var(--text-hint); }
  .form-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-cancel { flex: 1; padding: 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; color: var(--text); font-weight: 500; }
  .btn-submit { flex: 2; padding: 10px; background: var(--navy); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; cursor: pointer; font-weight: 500; transition: background 0.15s; }
  .btn-submit:hover { background: var(--navy-dark); }
  .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }
  
  /* TOAST */
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; padding: 10px 20px; border-radius: 30px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* EMPTY / LOADING */
  .empty { text-align: center; padding: 3rem; color: var(--text-sec); font-size: 14px; }
  .loading { text-align: center; padding: 3rem; color: var(--text-hint); font-size: 13px; }
  
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .form-grid { grid-template-columns: 1fr; }
    .dp-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">Ensetu <span>Talent Intelligence</span></div>
  <button class="add-btn" onclick="openAdd()">+ Add Candidate</button>
</div>

<div class="main">
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">Total candidates</div></div>
    <div class="stat"><div class="stat-val" id="s-imm">—</div><div class="stat-lbl">Immediately available</div></div>
    <div class="stat"><div class="stat-val" id="s-sap">—</div><div class="stat-lbl">SAP specialists</div></div>
    <div class="stat"><div class="stat-val" id="s-month">—</div><div class="stat-lbl">Added this month</div></div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="s-icon">⌕</span>
      <input type="text" id="q" placeholder="Search by skill, name, location... e.g. SAP ABAP" oninput="renderList()" />
    </div>
    <select id="nf" onchange="renderList()">
      <option value="">All notice periods</option>
      <option value="Immediate">Immediate</option>
      <option value="30 days">30 days</option>
      <option value="60 days">60 days</option>
    </select>
    <select id="ef" onchange="renderList()">
      <option value="">All experience</option>
      <option value="0-5">0–5 yrs</option>
      <option value="5-10">5–10 yrs</option>
      <option value="10+">10+ yrs</option>
    </select>
    <select id="lf" onchange="renderList()">
      <option value="">All locations</option>
    </select>
    <div class="view-toggle">
      <button class="vbtn active" id="vcard" onclick="setView('card')">⊞ Cards</button>
      <button class="vbtn" id="vtable" onclick="setView('table')">☰ Table</button>
    </div>
  </div>

  <div class="meta-bar">
    <div class="meta-txt" id="meta">Loading candidates...</div>
  </div>
  <div id="mainView"><div class="loading">Connecting to database...</div></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay" style="display:none" onclick="maybeCloseDetail(event)">
  <div class="detail" id="detailPanel"></div>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal" style="display:none">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Add New Candidate</div>
      <button class="dp-close" onclick="closeAdd()">✕</button>
    </div>
    <div class="form-grid">
      <div class="form-field"><label>Full Name *</label><input type="text" id="f-name" placeholder="e.g. Arjun Mehta" /></div>
      <div class="form-field"><label>Role / Designation *</label><input type="text" id="f-role" placeholder="e.g. SAP ABAP Developer" /></div>
      <div class="form-field"><label>Email</label><input type="email" id="f-email" placeholder="candidate@email.com" /></div>
      <div class="form-field"><label>Phone</label><input type="text" id="f-phone" placeholder="+91 98765 43210" /></div>
      <div class="form-field"><label>Location *</label><input type="text" id="f-loc" placeholder="e.g. Pune, Mumbai, Bangalore" /></div>
      <div class="form-field"><label>Experience (years) *</label><input type="number" id="f-exp" placeholder="e.g. 8" min="0" max="50" /></div>
      <div class="form-field"><label>Notice Period *</label>
        <select id="f-notice">
          <option value="">Select notice period</option>
          <option value="Immediate">Immediate</option>
          <option value="15 days">15 days</option>
          <option value="30 days">30 days</option>
          <option value="60 days">60 days</option>
          <option value="90 days">90 days</option>
        </select>
      </div>
      <div class="form-field"><label>Expected Rate / CTC</label><input type="text" id="f-rate" placeholder="e.g. ₹45L/yr or $50/hr" /></div>
      <div class="form-field full">
        <label>Skills *</label>
        <input type="text" id="f-skills" placeholder="SAP ABAP, Fiori, OData, BTP" />
        <span class="form-hint">Separate multiple skills with commas</span>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAdd()">Cancel</button>
      <button class="btn-submit" id="submitBtn" onclick="submitCandidate()">Save Candidate</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vzalxlbctddnktzpbwfd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_tXcQRHsD3Ep0VMMXV6sEKQ_jqw0mZZm';
const HEADERS = { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=representation' };

let allCandidates = [];
let view = 'card';
let selectedId = null;

// ── COLORS ──
const COLORS = [
  {bg:'#e6f1fb',tc:'#0c447c'},{bg:'#eaf3de',tc:'#27500a'},{bg:'#faeeda',tc:'#633806'},
  {bg:'#eeedfe',tc:'#3c3489'},{bg:'#e1f5ee',tc:'#085041'},{bg:'#fbeaf0',tc:'#72243e'},
  {bg:'#faece7',tc:'#712b13'},{bg:'#fcebeb',tc:'#791f1f'}
];
function colorFor(name) { let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function initials(name) { return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function npClass(n) { return n==='Immediate'?'np-i':n==='30 days'||n==='15 days'?'np-30':'np-60'; }
function expOk(e,f) { if(!f)return true; if(f==='0-5')return e<=5; if(f==='5-10')return e>5&&e<=10; return e>10; }
function scoreFor(c) {
  const expS = Math.min(40, c.experience * 3);
  const skillS = Math.min(30, (c.skills||[]).length * 7);
  const availS = c.notice_period==='Immediate'?30:c.notice_period==='15 days'||c.notice_period==='30 days'?20:10;
  return expS + skillS + availS;
}

// ── FETCH ──
async function fetchCandidates() {
  try {
    const r = await fetch(SUPABASE_URL+'/rest/v1/candidates?select=*&order=added_on.desc', { headers: HEADERS });
    if (!r.ok) throw new Error('Failed to fetch');
    allCandidates = await r.json();
    updateStats();
    populateLocationFilter();
    renderList();
  } catch(e) {
    document.getElementById('mainView').innerHTML = '<div class="empty">Could not connect to database. Check your internet connection.</div>';
    document.getElementById('meta').textContent = 'Connection error';
  }
}

function updateStats() {
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  document.getElementById('s-total').textContent = allCandidates.length;
  document.getElementById('s-imm').textContent = allCandidates.filter(c=>c.notice_period==='Immediate').length;
  document.getElementById('s-sap').textContent = allCandidates.filter(c=>(c.skills||[]).some(s=>s.toUpperCase().includes('SAP'))).length;
  document.getElementById('s-month').textContent = allCandidates.filter(c=>c.added_on>=monthStart).length;
}

function populateLocationFilter() {
  const locs = [...new Set(allCandidates.map(c=>c.location).filter(Boolean))].sort();
  const sel = document.getElementById('lf');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All locations</option>' + locs.map(l=>`<option value="${l}"${cur===l?' selected':''}>${l}</option>`).join('');
}

function getFiltered() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const nf = document.getElementById('nf').value;
  const ef = document.getElementById('ef').value;
  const lf = document.getElementById('lf').value;
  return allCandidates.filter(c => {
    const skills = (c.skills||[]);
    const mq = !q || (c.full_name||'').toLowerCase().includes(q) || (c.role||'').toLowerCase().includes(q) || (c.location||'').toLowerCase().includes(q) || skills.some(s=>s.toLowerCase().includes(q));
    return mq && (!nf||c.notice_period===nf) && expOk(c.experience||0, ef) && (!lf||c.location===lf);
  });
}

function setView(v) {
  view = v;
  document.getElementById('vcard').className = 'vbtn'+(v==='card'?' active':'');
  document.getElementById('vtable').className = 'vbtn'+(v==='table'?' active':'');
  renderList();
}

function renderList() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const list = getFiltered();
  document.getElementById('meta').innerHTML = `Showing <strong>${list.length}</strong> of ${allCandidates.length} candidates`;
  const el = document.getElementById('mainView');

  if (!list.length) {
    el.innerHTML = allCandidates.length === 0
      ? '<div class="empty">No candidates yet. Click <strong>+ Add Candidate</strong> to add your first one.</div>'
      : '<div class="empty">No candidates match your search. Try a different keyword.</div>';
    return;
  }

  if (view === 'card') {
    el.innerHTML = '<div class="card-grid">' + list.map(c => {
      const col = colorFor(c.full_name||'');
      const skills = (c.skills||[]);
      const tags = skills.map(s=>`<span class="tag${q&&s.toLowerCase().includes(q)?' hi':''}">${s}</span>`).join('');
      const score = scoreFor(c);
      return `<div class="ccard${selectedId===c.id?' sel':''}" onclick="openDetail('${c.id}')">
        <div class="cc-top">
          <div style="display:flex;align-items:center;gap:10px">
            <div class="ava" style="background:${col.bg};color:${col.tc}">${initials(c.full_name||'?')}</div>
            <div>
              <div class="cname">${c.full_name||'—'}</div>
              <div class="crole">${c.role||'—'} · ${c.location||'—'}</div>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <span class="score-pill">${score}%</span>
            <span class="np ${npClass(c.notice_period||'')}">${c.notice_period||'—'}</span>
          </div>
        </div>
        <div class="cc-tags">${tags||'<span style="font-size:12px;color:var(--text-hint)">No skills listed</span>'}</div>
        <div class="cc-foot">
          <div class="fi"><strong>${c.experience||'—'} yrs</strong> exp</div>
          ${c.rate?`<div class="fi"><strong>${c.rate}</strong></div>`:''}
          <div class="fi"><strong>${c.location||'—'}</strong></div>
          ${c.email?`<div class="fi" style="color:var(--text-hint)">${c.email}</div>`:''}
        </div>
      </div>`;
    }).join('') + '</div>';
  } else {
    el.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr><th>Candidate</th><th>Role</th><th>Skills</th><th>Exp</th><th>Notice</th><th>Rate</th><th>Fit</th></tr></thead>
      <tbody>${list.map(c => {
        const col = colorFor(c.full_name||'');
        const skills = (c.skills||[]);
        const tags = skills.slice(0,2).map(s=>`<span class="tag${q&&s.toLowerCase().includes(q)?' hi':''}" style="font-size:10px;padding:2px 7px">${s}</span>`).join(' ');
        const extra = skills.length>2?`<span class="tag" style="font-size:10px;padding:2px 7px">+${skills.length-2}</span>`:'';
        const score = scoreFor(c);
        return `<tr class="${selectedId===c.id?'sel-row':''}" onclick="openDetail('${c.id}')">
          <td><div style="display:flex;align-items:center;gap:8px">
            <div class="ava" style="width:30px;height:30px;font-size:11px;background:${col.bg};color:${col.tc}">${initials(c.full_name||'?')}</div>
            <div><div style="font-weight:600;font-size:13px">${c.full_name||'—'}</div><div style="font-size:11px;color:var(--text-sec)">${c.location||'—'}</div></div>
          </div></td>
          <td style="font-size:12px;color:var(--text-sec);max-width:140px">${c.role||'—'}</td>
          <td><div style="display:flex;gap:4px;flex-wrap:wrap">${tags}${extra}</div></td>
          <td style="white-space:nowrap;font-weight:500">${c.experience||'—'} yrs</td>
          <td><span class="np ${npClass(c.notice_period||'')}">${c.notice_period||'—'}</span></td>
          <td style="font-weight:500;white-space:nowrap">${c.rate||'—'}</td>
          <td><div style="display:flex;align-items:center;gap:6px">
            <div class="score-bar-sm"><div class="score-bar-fill" style="width:${score}%"></div></div>
            <span style="font-size:11px;color:var(--text-sec)">${score}%</span>
          </div></td>
        </tr>`;
      }).join('')}</tbody></table></div>`;
  }
}

// ── DETAIL PANEL ──
function openDetail(id) {
  const c = allCandidates.find(x=>x.id===id);
  if (!c) return;
  selectedId = id;
  renderList();
  const col = colorFor(c.full_name||'');
  const score = scoreFor(c);
  const scoreItems = [
    { label: 'Experience depth', val: Math.min(100, (c.experience||0)*7) },
    { label: 'Skill breadth', val: Math.min(100, (c.skills||[]).length*20) },
    { label: 'Availability', val: c.notice_period==='Immediate'?100:c.notice_period==='15 days'?80:c.notice_period==='30 days'?60:30 }
  ];
  document.getElementById('detailPanel').innerHTML = `
    <div class="dp-head">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="dp-ava" style="background:${col.bg};color:${col.tc}">${initials(c.full_name||'?')}</div>
        <div>
          <div style="font-size:17px;font-weight:600;color:var(--text)">${c.full_name||'—'}</div>
          <div style="font-size:13px;color:var(--text-sec);margin-top:2px">${c.role||'—'}</div>
        </div>
      </div>
      <button class="dp-close" onclick="closeDetail()">✕</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px">
      ${(c.skills||[]).map(s=>`<span class="tag">${s}</span>`).join('')||'<span style="font-size:12px;color:var(--text-hint)">No skills listed</span>'}
    </div>
    <div class="dp-grid">
      <div class="dp-field"><div class="dp-lbl">Location</div><div class="dp-val">${c.location||'—'}</div></div>
      <div class="dp-field"><div class="dp-lbl">Experience</div><div class="dp-val">${c.experience||'—'} years</div></div>
      <div class="dp-field"><div class="dp-lbl">Notice period</div><div class="dp-val"><span class="np ${npClass(c.notice_period||'')}">${c.notice_period||'—'}</span></div></div>
      <div class="dp-field"><div class="dp-lbl">Expected rate</div><div class="dp-val">${c.rate||'—'}</div></div>
      ${c.email?`<div class="dp-field"><div class="dp-lbl">Email</div><div class="dp-val" style="font-size:13px;word-break:break-all">${c.email}</div></div>`:''}
      ${c.phone?`<div class="dp-field"><div class="dp-lbl">Phone</div><div class="dp-val">${c.phone}</div></div>`:''}
    </div>
    <div class="score-section">
      <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px">Fit score · <span style="color:var(--navy)">${score}%</span></div>
      ${scoreItems.map(s=>`<div class="score-row">
        <div class="score-row-head"><span>${s.label}</span><span>${Math.round(s.val)}%</span></div>
        <div class="score-bar-full"><div class="score-bar-full-fill" style="width:${s.val}%"></div></div>
      </div>`).join('')}
    </div>
    <div style="font-size:11px;color:var(--text-hint);margin-bottom:8px">Added: ${c.added_on||'—'}</div>
    <div class="dp-actions">
      <button class="dp-btn dp-btn-secondary" onclick="closeDetail()">Close</button>
      <button class="dp-btn dp-btn-danger" onclick="deleteCandidate('${c.id}','${(c.full_name||'').replace(/'/g,"\\'")}')">Delete</button>
    </div>
  `;
  document.getElementById('detailOverlay').style.display = 'flex';
}

function closeDetail() {
  document.getElementById('detailOverlay').style.display = 'none';
  selectedId = null;
  renderList();
}

function maybeCloseDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetail();
}

// ── ADD CANDIDATE ──
function openAdd() { document.getElementById('addModal').style.display = 'flex'; }
function closeAdd() {
  document.getElementById('addModal').style.display = 'none';
  ['f-name','f-role','f-email','f-phone','f-loc','f-exp','f-rate','f-skills'].forEach(id=>{
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('f-notice').value = '';
}

async function submitCandidate() {
  const name = document.getElementById('f-name').value.trim();
  const role = document.getElementById('f-role').value.trim();
  const loc = document.getElementById('f-loc').value.trim();
  const exp = parseInt(document.getElementById('f-exp').value);
  const notice = document.getElementById('f-notice').value;
  const skillsRaw = document.getElementById('f-skills').value.trim();

  if (!name || !role || !loc || !notice || !skillsRaw || isNaN(exp)) {
    showToast('Please fill in all required fields (*)');
    return;
  }

  const skills = skillsRaw.split(',').map(s=>s.trim()).filter(Boolean);
  const payload = {
    full_name: name,
    role: role,
    location: loc,
    experience: exp,
    notice_period: notice,
    rate: document.getElementById('f-rate').value.trim() || null,
    email: document.getElementById('f-email').value.trim() || null,
    phone: document.getElementById('f-phone').value.trim() || null,
    skills: skills
  };

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  try {
    const r = await fetch(SUPABASE_URL+'/rest/v1/candidates', {
      method: 'POST',
      headers: HEADERS,
      body: JSON.stringify(payload)
    });
    if (!r.ok) {
      const err = await r.json();
      throw new Error(err.message || 'Save failed');
    }
    closeAdd();
    showToast('Candidate added successfully');
    await fetchCandidates();
  } catch(e) {
    showToast('Error: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Candidate';
  }
}

// ── DELETE ──
async function deleteCandidate(id, name) {
  if (!confirm(`Delete ${name}? This cannot be undone.`)) return;
  try {
    const r = await fetch(SUPABASE_URL+'/rest/v1/candidates?id=eq.'+id, {
      method: 'DELETE',
      headers: HEADERS
    });
    if (!r.ok) throw new Error('Delete failed');
    closeDetail();
    showToast(name + ' removed');
    await fetchCandidates();
  } catch(e) {
    showToast('Error deleting: ' + e.message);
  }
}

// ── TOAST ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── INIT ──
fetchCandidates();
</script>
</body>
</html>
